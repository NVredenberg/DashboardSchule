services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      PORT: ${PORT:-3001}
      WOL_RELAY_URL: ${WOL_RELAY_URL:-http://127.0.0.1:3011/wake}
    network_mode: host

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend
    network_mode: host
